{% extends "base.html" %}

{% block content %}
<h> Type 2 Venues </h>
{% for venue in type_two_venues %}
<li> {{ venue.name }} - Type 2 Venue</li>
<p> {{ venue.description }} </p>
<a href = "{% url 'venues:avail_calendar' venue.id %}">Check Availability</a>
<a href = "{% url 'venues:reservation_request' venue.id %}">Book</a>
{% endfor %}
<a href = "{% url 'venues:venue_type_choice' %}">Back to Venue Navigation</a>
{% endblock %}
