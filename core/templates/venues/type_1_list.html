{% extends "sidebar.html" %}

{% block app_content %}

<div class="max-w-6xl mx-auto">

    <!-- Header -->
    <div class="mb-8 flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">Type 1 Venues</h1>
            <p class="text-gray-500 mt-1">Venues that can be reserved without prior approval.</p>
        </div>

        <a href="{% url 'venues:venue_type_choice' %}"
           class="text-sm text-ateneo-blue hover:underline">
            ← Back
        </a>
    </div>

    <!-- Venue Cards -->
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

        {% for venue in type_one_venues %}
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col justify-between hover:shadow-md transition">

            <!-- Info -->
            <div>
                <h2 class="text-lg font-semibold text-gray-800">
                    {{ venue.name }}
                </h2>

                <p class="text-sm text-gray-500 mt-2 line-clamp-3">
                    {{ venue.description }}
                </p>
            </div>

            <!-- Actions -->
            <div class="mt-6 flex gap-2">

                <a href="{% url 'venues:avail_calendar' venue.id %}"
                   class="flex-1 text-center px-3 py-2 text-sm rounded-lg border border-gray-200 hover:bg-gray-50 transition">
                    Availability
                </a>

                <a href="{% url 'venues:reservation_request' venue.id %}"
                   class="flex-1 text-center px-3 py-2 text-sm rounded-lg bg-ateneo-blue text-white hover:opacity-90 transition">
                    Book
                </a>

            </div>

        </div>
        {% empty %}
        <div class="col-span-full text-center text-gray-500 py-12">
            No Type 1 venues available.
        </div>
        {% endfor %}

    </div>

</div>

{% endblock %}
