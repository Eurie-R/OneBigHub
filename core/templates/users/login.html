{% extends 'base.html' %}
{% block title %}Login — One Big Hub{% endblock %}

{% block content %}
<div class="min-h-screen gradient-bg flex items-center justify-center px-4">
    <div class="w-full max-w-md">

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-2xl p-8">

            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-14 h-14 bg-ateneo-blue rounded-full flex items-center justify-center mx-auto mb-4">
                    <span class="text-white font-bold text-2xl font-display">A</span>
                </div>
                <h1 class="text-2xl font-bold text-ateneo-blue font-display">Welcome back</h1>
                <p class="text-gray-500 text-sm mt-1">Sign in with your Ateneo email</p>
            </div>

            <!-- Error Message -->
            <div id="error-message"
                 class="hidden bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-lg mb-6">
            </div>

            <!-- Form -->
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" placeholder="yourname@student.ateneo.edu"
                           class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-ateneo-light focus:border-transparent transition"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" placeholder="••••••••"
                           class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-ateneo-light focus:border-transparent transition"/>
                </div>
                <button type="submit"
                        class="w-full bg-ateneo-blue text-white py-2.5 rounded-lg font-semibold hover:bg-blue-900 transition text-sm">
                    Sign In
                </button>
            </form>

            <!-- Footer -->
            <p class="text-center text-sm text-gray-500 mt-6">
                Don't have an account?
                <a href="/register/" class="text-ateneo-light font-semibold hover:underline">Register</a>
            </p>
        </div>

        <p class="text-center text-white/50 text-xs mt-6">
            Only @student.ateneo.edu and @ateneo.edu accounts are allowed.
        </p>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error-message');
        const button = e.target.querySelector('button');

        button.textContent = 'Signing in...';
        button.disabled = true;
        errorDiv.classList.add('hidden');

        try {
            const response = await fetch('/api/users/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                window.location.href = '/dashboard/';
            } else {
                errorDiv.textContent = data.error || 'Invalid credentials. Please try again.';
                errorDiv.classList.remove('hidden');
                button.textContent = 'Sign In';
                button.disabled = false;
            }
        } catch (err) {
            errorDiv.textContent = 'Something went wrong. Please try again.';
            errorDiv.classList.remove('hidden');
            button.textContent = 'Sign In';
            button.disabled = false;
        }
    });

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
{% endblock %}
