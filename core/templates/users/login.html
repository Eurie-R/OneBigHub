{% extends 'base.html' %}
{% load static %}

{% block title %}Login — One Big Hub{% endblock %}

{% block content %}
<div class="min-h-screen flex">

    <!-- Left Image -->
    <div class="hidden md:flex w-1/2 relative h-screen">
        <img src="{% static 'core/images/login_photo.jpg' %}" alt="Ateneo Campus"
             class="object-cover w-full h-full">
        <!-- Dark overlay -->
        <div class="absolute inset-0 bg-black/30"></div>
    </div>

    <!-- Right Login Panel -->
    <div class="flex items-center justify-center w-full md:w-1/2 px-6 bg-ateneo-blue">
        <div class="w-full max-w-md animate-fade-in-up">

            <!-- Card -->
            <div class="bg-white rounded-2xl shadow-2xl p-8">
                <!-- Header -->
                <div class="text-center mb-8">
                    <img src="{% static 'core/images/school_crest.png' %}" class="w-32 mx-auto mb-4">
                    <h1 class="text-2xl font-bold text-ateneo-blue font-display">Welcome back</h1>
                    <p class="text-gray-500 text-sm mt-1">Sign in with your Ateneo email</p>
                </div>
                
                <!-- Error Message -->
                <div id="error-message"
                    class="hidden bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-lg mb-6">
                </div>

                <!-- Form -->
                <form id="login-form" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="email" placeholder="yourname@student.ateneo.edu"
                            class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-ateneo-light focus:border-transparent transition"/>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="password" placeholder="••••••••"
                            class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-ateneo-light focus:border-transparent transition"/>
                    </div>
                    <button type="submit"
                            class="w-full bg-ateneo-gold text-white py-2.5 rounded-lg font-semibold hover:bg-yellow-600 transition text-sm">
                        Sign In
                    </button>
                </form>

                <!-- Footer -->
                <p class="text-center text-sm text-gray-500 mt-6">
                    Don't have an account?
                    <a href="/register/" class="text-ateneo-light font-semibold hover:underline">Register</a>
                </p>
            </div>

            <!-- Back to Home link below the card -->
            <div class="mt-4">
                <a href="{% url 'users:landing' %}"
                class="text-white text-sm font-semibold hover:underline">
                    ← Back to Home
                </a>
            </div>

            <p class="text-center text-white/50 text-xs mt-6 md:hidden">
                Only @student.ateneo.edu and @ateneo.edu accounts are allowed.
            </p>
        </div>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error-message');
        const button = e.target.querySelector('button');

        button.textContent = 'Signing in...';
        button.disabled = true;
        errorDiv.classList.add('hidden');

        try {
            const response = await fetch('/api/users/login/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                window.location.href = '/dashboard/';
            } else {
                errorDiv.textContent = data.error || 'Invalid credentials. Please try again.';
                errorDiv.classList.remove('hidden');
                button.textContent = 'Sign In';
                button.disabled = false;
            }
        } catch (err) {
            errorDiv.textContent = 'Something went wrong. Please try again.';
            errorDiv.classList.remove('hidden');
            button.textContent = 'Sign In';
            button.disabled = false;
        }
    });

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>

<style>
/* Fade-in animation for the panel */
@keyframes fade-in-up {
  0% { opacity: 0; transform: translateY(1.5rem); }
  100% { opacity: 1; transform: translateY(0); }
}
.animate-fade-in-up {
  animation: fade-in-up 0.7s ease-out forwards;
}

/* Subtle hover lift */
.animate-fade-in-up:hover {
  transform: translateY(-0.25rem);
  transition: transform 0.3s ease;
}
</style>
{% endblock %}
